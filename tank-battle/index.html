<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        h1 {
            color: #4ade80;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        #gameContainer {
            position: relative;
            border: 4px solid #4ade80;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
        }

        #gameCanvas {
            display: block;
            background: #0f0f23;
        }

        #controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        #startBtn {
            background: #4ade80;
            color: #1a1a2e;
        }

        #startBtn:hover {
            background: #22c55e;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.4);
        }

        #restartBtn {
            background: #f97316;
            color: white;
        }

        #restartBtn:hover {
            background: #ea580c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);
        }

        #instructions {
            margin-top: 20px;
            color: #94a3b8;
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        #instructions kbd {
            background: #334155;
            padding: 4px 8px;
            border-radius: 4px;
            color: #e2e8f0;
            font-family: inherit;
            border: 1px solid #475569;
        }

        #score {
            margin-top: 15px;
            color: #fbbf24;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 10px;
            text-align: center;
            display: none;
            border: 2px solid #ef4444;
        }

        #gameOver h2 {
            color: #ef4444;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        #gameOver p {
            color: #fbbf24;
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            #instructions {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 坦克大战</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="640"></canvas>
        <div id="gameOver">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
        </div>
    </div>
    <div id="score">得分: <span id="currentScore">0</span></div>
    <div id="controls">
        <button id="startBtn">开始游戏</button>
        <button id="restartBtn">重新开始</button>
    </div>
    <div id="instructions">
        <p><kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 移动坦克</p>
        <p><kbd>空格</kbd> 发射炮弹</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const currentScoreEl = document.getElementById('currentScore');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverEl = document.getElementById('gameOver');

        let gameRunning = false;
        let score = 0;
        let animationId;

        const TILE_SIZE = 40;
        const COLS = 12;
        const ROWS = 16;

        let player = {
            x: canvas.width / 2 - TILE_SIZE / 2,
            y: canvas.height - TILE_SIZE * 2,
            width: TILE_SIZE,
            height: TILE_SIZE,
            speed: 5,
            dx: 0,
            dy: 0,
            direction: 'up'
        };

        let bullets = [];
        let enemies = [];
        let enemyBullets = [];
        let particles = [];

        let keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false,
            Space: false
        };

        let lastEnemyShot = 0;
        let enemySpawnRate = 1500;

        function drawTank(x, y, width, height, direction, color, isPlayer = false) {
            ctx.save();
            ctx.translate(x + width / 2, y + height / 2);

            let rotation = 0;
            switch(direction) {
                case 'up': rotation = 0; break;
                case 'down': rotation = Math.PI; break;
                case 'left': rotation = -Math.PI / 2; break;
                case 'right': rotation = Math.PI / 2; break;
            }
            ctx.rotate(rotation);

            ctx.fillStyle = color;
            ctx.fillRect(-width / 2, -height / 2, width, height);

            ctx.fillStyle = isPlayer ? '#22c55e' : '#dc2626';
            ctx.fillRect(-4, -height / 2 - 8, 8, 10);

            ctx.fillStyle = '#1e3a5f';
            ctx.fillRect(-width / 2 + 4, -height / 2 + 4, width - 8, height - 8);

            ctx.fillStyle = isPlayer ? '#16a34a' : '#b91c1c';
            const trackWidth = 6;
            ctx.fillRect(-width / 2, -height / 2 + 2, trackWidth, height - 4);
            ctx.fillRect(width / 2 - trackWidth, -height / 2 + 2, trackWidth, height - 4);

            ctx.restore();
        }

        function drawBullet(bullet) {
            ctx.fillStyle = bullet.isPlayer ? '#fbbf24' : '#ef4444';
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = bullet.isPlayer ? '#f59e0b' : '#dc2626';
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, bullet.radius - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 30,
                    color: color
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawEnemy() {
            enemies.forEach(enemy => {
                drawTank(enemy.x, enemy.y, enemy.width, enemy.height, enemy.direction, '#dc2626');
            });
        }

        function spawnEnemy() {
            if (!gameRunning) return;

            const enemy = {
                x: Math.random() * (canvas.width - TILE_SIZE),
                y: -TILE_SIZE,
                width: TILE_SIZE,
                height: TILE_SIZE,
                speed: 1.5 + Math.random() * 1.5,
                direction: 'down'
            };
            enemies.push(enemy);
        }

        function updatePlayer() {
            player.dx = 0;
            player.dy = 0;

            if (keys.ArrowUp) {
                player.dy = -player.speed;
                player.direction = 'up';
            }
            if (keys.ArrowDown) {
                player.dy = player.speed;
                player.direction = 'down';
            }
            if (keys.ArrowLeft) {
                player.dx = -player.speed;
                player.direction = 'left';
            }
            if (keys.ArrowRight) {
                player.dx = player.speed;
                player.direction = 'right';
            }

            player.x += player.dx;
            player.y += player.dy;

            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
        }

        function shoot() {
            if (!gameRunning) return;

            let bulletX = player.x + player.width / 2;
            let bulletY = player.y + player.height / 2;
            let bulletDx = 0;
            let bulletDy = 0;

            switch(player.direction) {
                case 'up': bulletDy = -8; bulletY = player.y; break;
                case 'down': bulletDy = 8; bulletY = player.y + player.height; break;
                case 'left': bulletDx = -8; bulletX = player.x; break;
                case 'right': bulletDx = 8; bulletX = player.x + player.width; break;
            }

            bullets.push({
                x: bulletX,
                y: bulletY,
                dx: bulletDx,
                dy: bulletDy,
                radius: 5,
                isPlayer: true
            });
        }

        function enemyShoot() {
            if (!gameRunning) return;

            const now = Date.now();
            if (now - lastEnemyShot < 800) return;
            lastEnemyShot = now;

            enemies.forEach(enemy => {
                if (Math.random() > 0.7) {
                    enemyBullets.push({
                        x: enemy.x + enemy.width / 2,
                        y: enemy.y + enemy.height,
                        dx: 0,
                        dy: 5,
                        radius: 4,
                        isPlayer: false
                    });
                }
            });
        }

        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.dx;
                b.y += b.dy;

                if (b.y < -10 || b.y > canvas.height + 10 || b.x < -10 || b.x > canvas.width + 10) {
                    bullets.splice(i, 1);
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.x += b.dx;
                b.y += b.dy;

                if (b.y < -10 || b.y > canvas.height + 10 || b.x < -10 || b.x > canvas.width + 10) {
                    enemyBullets.splice(i, 1);
                }
            }
        }

        function updateEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.y += enemy.speed;

                if (enemy.y > canvas.height) {
                    enemies.splice(i, 1);
                }
            }
        }

        function checkCollisions() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];

                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];

                    if (b.x > enemy.x && b.x < enemy.x + enemy.width &&
                        b.y > enemy.y && b.y < enemy.y + enemy.height) {

                        createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, '#f97316');
                        enemies.splice(j, 1);
                        bullets.splice(i, 1);
                        score += 10;
                        currentScoreEl.textContent = score;

                        if (score % 100 === 0 && enemySpawnRate > 500) {
                            enemySpawnRate -= 100;
                        }
                        break;
                    }
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];

                if (b.x > player.x && b.x < player.x + player.width &&
                    b.y > player.y && b.y < player.y + player.height) {

                    gameOver();
                    return;
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];

                if (player.x < enemy.x + enemy.width &&
                    player.x + player.width > enemy.x &&
                    player.y < enemy.y + enemy.height &&
                    player.y + player.height > enemy.y) {

                    gameOver();
                    return;
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#1e3a5f';
            ctx.lineWidth = 1;
            for (let i = 0; i <= canvas.width; i += TILE_SIZE) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= canvas.height; i += TILE_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            drawTank(player.x, player.y, player.width, player.height, player.direction, '#4ade80', true);

            drawEnemy();

            bullets.forEach(b => drawBullet(b));
            enemyBullets.forEach(b => drawBullet(b));

            drawParticles();
        }

        function gameLoop() {
            if (!gameRunning) return;

            updatePlayer();
            updateBullets();
            updateEnemies();
            updateParticles();
            checkCollisions();

            draw();

            animationId = requestAnimationFrame(gameLoop);
        }

        let enemySpawnInterval;

        function startGame() {
            gameRunning = true;
            score = 0;
            currentScoreEl.textContent = score;
            gameOverEl.style.display = 'none';

            player.x = canvas.width / 2 - TILE_SIZE / 2;
            player.y = canvas.height - TILE_SIZE * 2;
            player.direction = 'up';

            bullets = [];
            enemies = [];
            enemyBullets = [];
            particles = [];
            enemySpawnRate = 1500;

            gameLoop();

            enemySpawnInterval = setInterval(() => {
                if (gameRunning) {
                    spawnEnemy();
                    enemyShoot();
                }
            }, enemySpawnRate);

            startBtn.textContent = '游戏中...';
            startBtn.disabled = true;
        }

        function restartGame() {
            cancelAnimationFrame(animationId);
            clearInterval(enemySpawnInterval);
            startGame();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            clearInterval(enemySpawnInterval);

            createExplosion(player.x + player.width / 2, player.y + player.height / 2, '#ef4444');
            draw();

            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';

            startBtn.textContent = '开始游戏';
            startBtn.disabled = false;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key in keys) {
                keys[e.key] = true;
                e.preventDefault();
            }
            if (e.key === ' ' || e.code === 'Space') {
                shoot();
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key in keys) {
                keys[e.key] = false;
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);

        draw();
    </script>
</body>
</html>
